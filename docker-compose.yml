services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?Definí POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:?Definí POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - ADMIN_USERNAME=${ADMIN_USERNAME:?Definí ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?Definí ADMIN_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET:?Definí SESSION_SECRET}
      - NODE_ENV=production
    ports:
      - "3000:3000"

volumes:
  db_data:
